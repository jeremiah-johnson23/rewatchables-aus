name: Weekly Episode Update

on:
  schedule:
    # Every Tuesday at 6:00 PM AEDT (07:00 UTC)
    - cron: '0 7 * * 2'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  add-new-episodes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check and add new episodes
        id: add
        run: |
          output=$(python scripts/add_new_episode.py --count 5 2>&1)
          echo "$output"

          if echo "$output" | grep -q "Added.*episode"; then
            echo "added=true" >> $GITHUB_OUTPUT
            # Extract titles for commit message
            titles=$(echo "$output" | grep "Adding:" | sed 's/.*Adding: //' | tr '\n' ', ' | sed 's/, $//')
            echo "titles=$titles" >> $GITHUB_OUTPUT
          else
            echo "added=false" >> $GITHUB_OUTPUT
          fi

      - name: Enrich metadata via TMDB
        id: tmdb
        if: steps.add.outputs.added == 'true'
        continue-on-error: true
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scripts/enrich_metadata.py

      - name: Fetch streaming availability
        if: steps.add.outputs.added == 'true'
        run: python scripts/fetch_streaming_availability.py

      - name: Fetch Apple Podcast URLs
        if: steps.add.outputs.added == 'true'
        run: python scripts/fetch_apple_podcast_urls.py

      - name: Warn if TMDB enrichment failed
        if: steps.tmdb.outcome == 'failure'
        run: echo "::warning::TMDB enrichment failed — episode(s) missing year, director, genres, studio. Check API key."

      - name: Commit and push changes
        id: commit
        if: steps.add.outputs.added == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/episodes.json
          git diff --staged --quiet || git commit -m "Add new episode(s): ${{ steps.add.outputs.titles }}

          Auto-enriched: TMDB metadata, JustWatch AU streaming, Apple Podcast URLs.

          🤖 Generated by GitHub Actions"
          git push

      - name: Send status email
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          ADDED="${{ steps.add.outputs.added }}"
          TITLES="${{ steps.add.outputs.titles }}"
          TMDB_OK="${{ steps.tmdb.outcome }}"

          if [ "$ADDED" = "true" ]; then
            if [ "$TMDB_OK" = "failure" ]; then
              SUBJECT="⚠️ Rewatchables AU: new episode added, TMDB enrichment failed"
              BODY="<h3>Weekly Update: Partial Success</h3><p>New episode(s) added: <strong>${TITLES}</strong></p><p>Streaming and podcast data populated, but TMDB metadata (year, director, genres, studio) failed. Check the TMDB_API_KEY secret or <a href=\"https://github.com/jeremiah-johnson23/rewatchables-aus/actions\">review the workflow run</a>.</p>"
            else
              SUBJECT="✅ Rewatchables AU: new episode added"
              BODY="<h3>Weekly Update: Success</h3><p>New episode(s) added and fully enriched: <strong>${TITLES}</strong></p><p>TMDB metadata, streaming availability, and podcast URLs all populated. <a href=\"https://rewatchables.au\">View the site</a>.</p>"
            fi
          else
            SUBJECT="ℹ️ Rewatchables AU: no new episodes this week"
            BODY="<h3>Weekly Update: No Changes</h3><p>No new episodes found in the RSS feed. Nothing to update.</p>"
          fi

          JSON=$(jq -n \
            --arg from "Rewatchables AU <simon@reflive.com>" \
            --arg to "simon@reflive.com" \
            --arg subject "$SUBJECT" \
            --arg html "$BODY" \
            '{from: $from, to: [$to], subject: $subject, html: $html}')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$JSON")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY_RESP=$(echo "$RESPONSE" | sed '$d')
          echo "Resend API response ($HTTP_CODE): $BODY_RESP"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Email notification failed (HTTP $HTTP_CODE): $BODY_RESP"
          fi
